name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&exclude_repo=xoolive.github.io&hide=Jupyter%20Notebook,HTML,CSS,SCSS,Makefile,CMake,Vim%20script,TeX&langs_count=8
          path: profile/languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Main project pins
      - name: Generate pin - traffic
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=traffic&show_owner=false
          path: profile/pin-traffic.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - traffic.js
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=traffic.js&show_owner=false
          path: profile/pin-traffic-js.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - thrust
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=thrust&show_owner=false
          path: profile/pin-thrust.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - tangram
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=open-aviation&repo=tangram&show_owner=true
          path: profile/pin-tangram.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Library pins
      - name: Generate pin - python
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=python&show_owner=false
          path: profile/pin-python.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - aviationbook
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=open-aviation&repo=aviationbook&show_owner=true
          path: profile/pin-aviationbook.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - cartes
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=cartes&show_owner=false
          path: profile/pin-cartes.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - jet1090
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=jet1090&show_owner=false
          path: profile/pin-jet1090.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - pitot
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=open-aviation&repo=pitot&show_owner=true
          path: profile/pin-pitot.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - pyopensky
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=open-aviation&repo=pyopensky&show_owner=true
          path: profile/pin-pyopensky.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - ship162
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=ship162&show_owner=false
          path: profile/pin-ship162.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - desperado
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=desperado&show_owner=false
          path: profile/pin-desperado.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - impunity
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=achevrot&repo=impunity&show_owner=false
          path: profile/pin-impunity.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Teaching materials
      - name: Generate pin - pyclass
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=pyclass&show_owner=false
          path: profile/pin-pyclass.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - optim4ai
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=optim4ai&show_owner=false
          path: profile/pin-optim4ai.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - constraints
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=constraints&show_owner=false
          path: profile/pin-constraints.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin - facile
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=xoolive&repo=facile&show_owner=false
          path: profile/pin-facile.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update README cards" && git push)
